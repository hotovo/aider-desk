name: Star History

on:
  schedule:
    - cron: '0 0 * * *'
  watch:
    types: [started]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: star-history
  cancel-in-progress: true

jobs:
  star-history:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: narayann7/star-history-action@v1
        with:
          repos: ${{ github.repository }}
          output-dir: docs-site/static/img
          update-readme: 'false'
          commit-message: 'docs: updated star history'
