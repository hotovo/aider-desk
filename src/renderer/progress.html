<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Starting...</title>
  <style>
    @font-face {
      font-family: 'Sono';
      src: url('./src/fonts/Sono.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
    }
  </style>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      padding: 32px;
      background: transparent;
      color: #f1f3f5;
      font-family: 'Sono', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      position: relative;
      -webkit-app-region: drag;
    }

    .container {
      position: relative;
      background: #222431;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      border: 1px solid #3d4166;
      border-radius: 12px;
      padding: 32px;
      width: 100%;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
      -webkit-app-region: no-drag;
    }

    .container::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(34, 36, 49, 0.7);
      border-radius: 12px;
      pointer-events: none;
      z-index: 1;
    }

    #splash-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 12px;
      z-index: 0;
    }

    .brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      margin-bottom: 32px;
      position: relative;
      z-index: 1;
    }

    .brand-icon {
      width: 72px;
      height: 72px;
      border-radius: 14px;
    }

    .brand-name {
      font-size: 20px;
      font-weight: 600;
      color: #f1f3f5;
      letter-spacing: -0.3px;
    }

    .detail {
      font-size: 13px;
      font-weight: 400;
      /*color: #999ba3;*/
      text-align: center;
      min-height: 20px;
      margin-bottom: 28px;
      position: relative;
      z-index: 1;
    }

    .detail-text {
      opacity: 0;
      animation: fadeIn 0.3s ease forwards;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    .completed .detail {
      color: #22c55edd;
    }

    .progress-container {
      width: 100%;
      height: 2px;
      background: #333652;
      border-radius: 1px;
      overflow: hidden;
      margin-bottom: 20px;
      position: relative;
      z-index: 1;
    }

    .progress-bar {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      background: #f1f3f588;
      border-radius: 1px;
      transition: width 0.3s ease;
    }

    .progress-indeterminate {
      width: 40%;
      animation: indeterminate-slide 1.8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }

    @keyframes indeterminate-slide {
      0% {
        left: -40%;
        right: 100%;
      }
      60% {
        left: 100%;
        right: -40%;
      }
      100% {
        left: 100%;
        right: -40%;
      }
    }

    .completed .progress-bar {
      width: 100% !important;
      animation: none;
      background: #22c55e;
    }

    .log-line {
      width: 100%;
      font-size: 11px;
      /*color: #7b7d86;*/
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-family: 'Sono', monospace;
      text-align: center;
      opacity: 0.8;
      min-height: 16px;
      transition: opacity 0.3s ease;
      position: relative;
      z-index: 1;
    }

    .log-line:not(:empty) {
      opacity: 1;
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from {
        transform: translateY(4px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .completed .detail {
      color: #22c55e4c;
    }
  </style>
</head>
<body>
  <div class="container">
    <video id="splash-video" autoplay muted loop></video>
    <div class="brand">
      <div class="brand-icon-wrapper">
        <img class="brand-icon" id="brand-icon" src="" alt="AiderDesk">
      </div>
      <span class="brand-name">AiderDesk</span>
    </div>

    <div class="detail">
      <span class="detail-text" id="detail-text">Initializing...</span>
    </div>

    <div class="progress-container">
      <div class="progress-bar progress-indeterminate" id="progress-bar"></div>
    </div>

    <div class="log-line" id="log-line"></div>
  </div>

  <script>
    const { ipcRenderer } = require('electron');

    ipcRenderer.on('set-icon-path', (_, iconPath) => {
      document.getElementById('brand-icon').src = iconPath;
    });

    ipcRenderer.on('set-splash-image', (_, imagePath) => {
      const video = document.getElementById('splash-video');
      video.src = imagePath;
    });

    ipcRenderer.on('set-title', (_, title) => {
      // Title is no longer displayed, but keep handler for compatibility
    });

    ipcRenderer.on('set-detail', (_, value) => {
      const detailTextEl = document.getElementById('detail-text');

      // Trigger fade-in animation by removing and re-adding the element
      detailTextEl.style.animation = 'none';
      setTimeout(() => {
        detailTextEl.textContent = value;
        detailTextEl.style.animation = 'fadeIn 0.4s ease forwards';
      }, 10);
    });

    ipcRenderer.on('set-completed', () => {
      document.body.classList.add('completed');
      const progressBar = document.getElementById('progress-bar');
      progressBar.classList.remove('progress-indeterminate');
    });

    const logLine = document.getElementById('log-line');

    ipcRenderer.on('add-log', (_, message) => {
      logLine.textContent = message;
    });
  </script>
</body>
</html>
